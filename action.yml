name: 'Mark2Confluence'
description: Uses kovetskiy/mark to publish markdown files to confluence pages
inputs:
  action:
    description: "Action to perform: verify|dry-run|publish"
    required: true
  CONFLUENCE_USERNAME:
    description: "Username for confluence"
    required: true
  CONFLUENCE_PASSWORD:
    description: "Password for confluence"
    required: true
  CONFLUENCE_BASE_URL:
    description: Confluence base url
    required: true
  DOC_DIR:
    description: The root directory where to look for markdown files
    required: false
    default: ""
  DOC_DIR_PATTERN:
    description: "Regexp to filter markdown files"
    required: false
    default: ""
  MODIFIED_INTERVAL:
    description: "Evaluate only files newer than (in minutes)(default: 0 means is disabled) "
    required: false
    default: "0"
  FILES:
    description: "Space separated list of files. When specified, the action only process the files in the list"
    required: false
    default: ""
  HEADER_TEMPLATE:
    description: The header to add to each markdown files, this will jinja evaluated
    required: false
    default: "---\n\n**WARNING**: This page is automatically generated from [this source code]({{source_link}})\n\n---\n<!-- Include: ac:toc -->"
  FEATURES:
    description: "Comma-separated list of mark features to enable. Supported: mermaid, d2, mention, mkdocsadmonitions. Defaults: mermaid, mention"
    required: false
    default: ""
  MERMAID_SCALE:
    description: "Scale factor for mermaid diagram rendering (default: 1)"
    required: false
    default: ""
  D2_SCALE:
    description: "Scale factor for d2 diagram rendering (default: 1)"
    required: false
    default: ""
  SOURCE_BRANCH:
    description: "Branch name used in the source code link header (default: main). Use this instead of the git ref which may point to a deleted tag or branch."
    required: false
    default: "main"
  IMAGE_RENDER_SIZE:
    description: "Defines image width in pixels for the Confluence ac:image macro"
    required: false
    default: "900"
runs:
  using: "docker"
  image: Dockerfile
